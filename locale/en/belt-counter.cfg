help-tooltip=Connect this counter to a transport belt with a red or green circuit wire.\nOn that belt, open it and enable "read belt contents", then choose PULSE mode.\nIn pulse mode each item entering the belt emits a single signal, which the counter tallies over time and by quality.\nHold mode will NOT count correctly.
